<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Для Полечки ❤️</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:#f5efe7;
      color:#2d2d2d;
      overflow-x:hidden;
      font-family:'Montserrat',sans-serif;
    }

    .hero{
      width:100%;
      height:100vh;
      position:relative;
      overflow:hidden;
    }

    .hero::before{
      content:'';
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.35);
      z-index:1;
    }

    .hero img{
      width:100%;
      height:100%;
      object-fit:cover;
      animation:zoom 12s ease-in-out infinite alternate;
    }

    @keyframes zoom{
      from{
        transform:scale(1);
      }
      to{
        transform:scale(1.08);
      }
    }

    .hero-content{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      z-index:2;
      text-align:center;
      color:white;
      width:90%;
    }

    .hero-content h1{
      font-family:'Cormorant Garamond',serif;
      font-size:72px;
      font-weight:500;
      margin-bottom:20px;
      letter-spacing:1px;
    }

    .hero-content p{
      font-size:20px;
      line-height:1.7;
      max-width:700px;
      margin:0 auto 40px;
      font-weight:300;
    }

    .start-btn{
      display:inline-block;
      padding:16px 38px;
      border-radius:50px;
      text-decoration:none;
      color:white;
      border:1px solid rgba(255,255,255,0.5);
      backdrop-filter:blur(10px);
      background:rgba(255,255,255,0.08);
      transition:0.4s;
      font-size:15px;
      letter-spacing:1px;
    }

    .start-btn:hover{
      background:white;
      color:#222;
      transform:translateY(-3px);
    }

    .music-note{
      position:absolute;
      bottom:30px;
      right:30px;
      z-index:3;
      color:white;
      font-size:14px;
      opacity:0.8;
      letter-spacing:1px;
    }

    .scroll-indicator{
      position:absolute;
      bottom:35px;
      left:50%;
      transform:translateX(-50%);
      z-index:3;
      color:white;
      font-size:13px;
      letter-spacing:2px;
      opacity:0.8;
    }

    @media(max-width:768px){

      .hero-content h1{
        font-size:48px;
      }

      .hero-content p{
        font-size:17px;
      }

    }
.music-button{

  position:fixed;

  right:22px;

  bottom:22px;

  width:52px;

  height:52px;

  border:none;

  border-radius:50%;

  background:rgba(255,255,255,0.12);

  backdrop-filter:blur(14px);

  color:white;

  font-size:22px;

  cursor:pointer;

  z-index:9999;

  transition:0.4s;

  border:1px solid rgba(255,255,255,0.12);

}

.music-button:hover{

  transform:scale(1.08);

  background:rgba(255,255,255,0.22);

}
  </style>
</head>

<body>
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-button" onclick="toggleMusic()">
  ♪
</button>
  <section class="hero">

    <img src="hero-main.jpg" alt="">

    <div class="hero-content">

      <h1>Для Полечки ❤️</h1>

      <p>
        Наша история началась случайно.
        Но стала самым важным событием в моей жизни.
      </p>

      <a href="story.html" class="start-btn">
        Начать путешествие
      </a>

    </div>

    <div class="scroll-indicator">
      love story
    </div>



  </section>
  <script>

  const music = document.getElementById('bgMusic');

  music.volume = 0.45;

  const savedTime = localStorage.getItem('musicTime');

  if(savedTime){

    music.currentTime = savedTime;

  }

  const wasPlaying = localStorage.getItem('musicPlaying');

  if(wasPlaying === 'true'){

    function resumeMusic(){

      music.play();

      document.removeEventListener('click', resumeMusic);
      document.removeEventListener('touchstart', resumeMusic);

    }

    document.addEventListener('click', resumeMusic);

    document.addEventListener('touchstart', resumeMusic);

  }

  function toggleMusic(){

    if(music.paused){

      music.play();

      localStorage.setItem('musicPlaying', 'true');

    } else {

      music.pause();

      localStorage.setItem('musicPlaying', 'false');

    }

  }

  setInterval(() => {

    localStorage.setItem('musicTime', music.currentTime);

  }, 500);

</script>

</body>
</html>
